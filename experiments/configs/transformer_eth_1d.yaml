# Transformer · ETH · daily horizon
defaults:
  - base_config

model:
  name: transformer
  d_model: 128
  nhead: 8
  num_encoder_layers: 3
  dim_feedforward: 512
  dropout: 0.1

data:
  target_asset: ETH
  interval: 1d
  forecast_horizon: 7

training:
  max_epochs: 200
  batch_size: 32
  learning_rate: 0.0005
